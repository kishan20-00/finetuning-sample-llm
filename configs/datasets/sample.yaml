# Tiny in-repo chat dataset for smoke-testing the whole pipeline end to end.
# Swap source to `hf` to pull a real dataset from the Hub (see commented example).
name: sample-chat
source: local
path: data/samples/sample_chat.jsonl
format: chat            # records are {"messages": [{"role","content"}, ...]}
text_field: messages
split: train
max_samples: null

