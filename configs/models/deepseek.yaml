# DeepSeek — the small, runnable option is the R1 distill into a 1.5B Qwen2 base.
# Great for studying reasoning-style fine-tuning on modest hardware.
family: deepseek
display_name: DeepSeek-R1-Distill-Qwen-1.5B
params_b: 1.5
hf_model_id: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B   # official repo; QLoRA quantizes this to 4-bit
# mlx_model_id:                                          # optional: local path to a pre-converted 4-bit MLX model
chat_template: auto
trust_remote_code: false
# Distilled onto the Qwen2 architecture -> same LoRA target modules.
lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
notes: >
  Reasoning-distilled model; pairs well with chain-of-thought style datasets.
  The 7B/8B distills (Qwen/Llama bases) are QLoRA-only on a 12GB 4070.
variants:
  - { hf_model_id: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B,  params_b: 7.0 }
  - { hf_model_id: deepseek-ai/DeepSeek-R1-Distill-Llama-8B, params_b: 8.0 }
