# Gemma 2 — Google. Official google/gemma weights are gated; default to the
# ungated Unsloth mirror. Gemma strongly prefers bf16 (fp16 can be unstable).
family: gemma
display_name: Gemma-2-2B-it
params_b: 2.0
hf_model_id: unsloth/gemma-2-2b-it                  # ungated mirror; QLoRA quantizes this to 4-bit
# mlx_model_id:                                     # optional: local path to a pre-converted 4-bit MLX model
chat_template: auto
trust_remote_code: false
lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
notes: >
  Official id is google/gemma-2-2b-it (accept the license on the Hub). Prefer
  bf16; on hardware without bf16 the planner falls back to fp16 — watch for NaNs.
variants:
  - { hf_model_id: google/gemma-2-2b-it, params_b: 2.0 }   # gated
  - { hf_model_id: unsloth/gemma-2-9b-it, params_b: 9.0 }   # QLoRA only on 12GB
